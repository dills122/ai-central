name: Skill Security

on:
  pull_request:
    paths:
      - "templates/skills/**"
      - ".github/workflows/skill-security.yml"
  push:
    branches: [main]
    paths:
      - "templates/skills/**"
      - ".github/workflows/skill-security.yml"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Skill scanner
    uses: cisco-ai-defense/skill-scanner/.github/workflows/scan-skills.yml@main
    with:
      skill_path: templates/skills
      policy: balanced
      fail_on_severity: critical
      lenient: false
      use_behavioral: false
      use_llm: false
